<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыка - borbehr.eu.org</title>
    <meta name="description" content="Музыка borbehr — плейлист и плеер.">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="canonical" href="https://borbehr.eu.org/music/">
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --error-color: #f85149;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8b949e;
            margin: 10px 0;
        }

        .back-link {
            display: inline-block;
            color: var(--accent-color);
            text-decoration: none;
            margin-bottom: 30px;
            padding: 10px 20px;
            border: 1px solid var(--accent-color);
            border-radius: 6px;
            transition: all 0.2s;
        }

        .back-link:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        .music-player {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .track-info {
            flex: 1;
            min-width: 200px;
        }

        .track-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 5px 0;
        }

        .track-artist {
            color: #8b949e;
            margin: 0;
        }

        .player-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: var(--accent-color);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .control-btn:hover {
            transform: scale(1.1);
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .player-progress {
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 6px;
            background: #30363d;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.1s ease;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #8b949e;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .volume-control input {
            width: 150px;
            height: 4px;
            background: #30363d;
            border-radius: 2px;
            outline: none;
        }

        .playlist {
            display: grid;
            gap: 15px;
        }

        .playlist-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .playlist-item:hover {
            border-color: var(--accent-color);
            transform: translateX(5px);
        }

        .playlist-item.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        .playlist-number {
            width: 30px;
            height: 30px;
            background: #30363d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .playlist-info {
            flex: 1;
        }

        .playlist-title {
            font-weight: 600;
            margin: 0 0 5px 0;
        }

        .playlist-artist {
            font-size: 0.9rem;
            color: #8b949e;
            margin: 0;
        }

        .playlist-duration {
            color: #8b949e;
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #8b949e;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #30363d;
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-message {
            text-align: center;
            padding: 30px;
            color: #8b949e;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .player-header {
                flex-direction: column;
                text-align: center;
            }
            
            .player-controls {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-link">← На главную</a>
            <h1>Музыка</h1>
            <p class="subtitle">Мои музыкальные творения</p>
        </div>

        <div class="music-player">
            <div class="player-header">
                <div class="track-info">
                    <h3 class="track-title" id="track-title">Выберите трек</h3>
                    <p class="track-artist" id="track-artist">borbehr</p>
                </div>
                <div class="player-controls">
                    <button class="control-btn" id="prev-btn">⏮️</button>
                    <button class="control-btn play-btn" id="play-btn">▶️</button>
                    <button class="control-btn" id="next-btn">⏭️</button>
                </div>
            </div>
            
            <div class="player-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="time-display">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>
            </div>
            
            <div class="volume-control">
                <span>🔊</span>
                <input type="range" id="volume-slider" min="0" max="100" value="70">
            </div>
        </div>
        
        <div class="playlist" id="playlist">
            <div class="loading">
                <div class="spinner"></div>
                <p>Загрузка музыки...</p>
            </div>
        </div>
    </div>

    <script>
        let audio = new Audio();
        let currentTrackIndex = 0;
        let isPlaying = false;
        let tracks = [];
        
        // Load music configuration
        async function loadMusic() {
            try {
                const response = await fetch('/music-config.json');
                const config = await response.json();
                
                tracks = config.tracks.map((track, index) => ({
                    id: index,
                    name: track.file,
                    title: track.title,
                    artist: track.artist,
                    url: `/music/${track.file}`
                }));
                
                renderPlaylist();
                
                // Auto-select first track
                if (tracks.length > 0) {
                    selectTrack(0);
                }
                
            } catch (error) {
                console.error('Error loading music config:', error);
                document.getElementById('playlist').innerHTML = `
                    <div class="status-message">
                        <p>Ошибка загрузки конфигурации музыки</p>
                    </div>
                `;
            }
        }
        
        function renderPlaylist() {
            const playlist = document.getElementById('playlist');
            const playlistHTML = tracks.map((track, index) => `
                <div class="playlist-item ${index === currentTrackIndex ? 'active' : ''}" data-index="${index}">
                    <div class="playlist-number">${index + 1}</div>
                    <div class="playlist-info">
                        <div class="playlist-title">${track.title}</div>
                        <div class="playlist-artist">${track.artist}</div>
                    </div>
                    <div class="playlist-duration">--:--</div>
                </div>
            `).join('');
            
            playlist.innerHTML = playlistHTML;
            
            // Add click events
            document.querySelectorAll('.playlist-item').forEach(item => {
                item.addEventListener('click', function() {
                    const index = parseInt(this.dataset.index);
                    selectTrack(index);
                    if (isPlaying) {
                        playTrack();
                    }
                });
            });
        }
        
        function selectTrack(index) {
            currentTrackIndex = index;
            const track = tracks[index];
            
            audio.src = track.url;
            document.getElementById('track-title').textContent = track.title;
            
            // Update active state
            document.querySelectorAll('.playlist-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        }
        
        function playTrack() {
            audio.play();
            isPlaying = true;
            document.getElementById('play-btn').textContent = '⏸️';
        }
        
        function pauseTrack() {
            audio.pause();
            isPlaying = false;
            document.getElementById('play-btn').textContent = '▶️';
        }
        
        // Player controls
        document.getElementById('play-btn').addEventListener('click', function() {
            if (isPlaying) {
                pauseTrack();
            } else {
                playTrack();
            }
        });
        
        document.getElementById('prev-btn').addEventListener('click', function() {
            currentTrackIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
            selectTrack(currentTrackIndex);
            if (isPlaying) {
                playTrack();
            }
        });
        
        document.getElementById('next-btn').addEventListener('click', function() {
            currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
            selectTrack(currentTrackIndex);
            if (isPlaying) {
                playTrack();
            }
        });
        
        // Progress bar
        audio.addEventListener('timeupdate', function() {
            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            
            document.getElementById('current-time').textContent = formatTime(audio.currentTime);
            document.getElementById('total-time').textContent = formatTime(audio.duration);
        });
        
        // Auto-play next track
        audio.addEventListener('ended', function() {
            currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
            selectTrack(currentTrackIndex);
            playTrack();
        });
        
        // Volume control
        document.getElementById('volume-slider').addEventListener('input', function() {
            audio.volume = this.value / 100;
        });
        
        // Set initial volume
        audio.volume = 0.7;
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${minutes}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Load music on page load
        loadMusic();
    </script>
</body>
</html>
