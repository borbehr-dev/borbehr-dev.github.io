<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проекты - borbehr.eu.org</title>
    <meta name="description" content="Проекты borbehr — список репозиториев на GitLab.">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="canonical" href="https://borbehr.eu.org/projects/">
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --error-color: #f85149;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8b949e;
            margin: 10px 0;
        }

        .back-link {
            display: inline-block;
            color: var(--accent-color);
            text-decoration: none;
            margin-bottom: 30px;
            padding: 10px 20px;
            border: 1px solid var(--accent-color);
            border-radius: 6px;
            transition: all 0.2s;
        }

        .back-link:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
        }

        .refresh-btn {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #4a8eff;
            transform: translateY(-2px);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .project-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .project-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.1);
        }

        .project-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .project-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .project-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0;
        }

        .project-title a {
            color: var(--text-color);
            text-decoration: none;
        }

        .project-title a:hover {
            color: var(--accent-color);
        }

        .project-description {
            color: #8b949e;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .project-stats {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: #8b949e;
        }

        .project-stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #8b949e;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #30363d;
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-message {
            text-align: center;
            padding: 30px;
            color: #8b949e;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-link">← На главную</a>
            <h1>Проекты</h1>
            <p class="subtitle">Open source проекты на GitLab</p>
        </div>

        <div class="controls">
            <button class="refresh-btn" id="refresh-projects">
                🔄 Обновить
            </button>
        </div>

        <div class="projects-grid" id="projects-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Загрузка проектов...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadProjects() {
            const grid = document.getElementById('projects-grid');
            
            try {
                grid.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Загрузка проектов...</p>
                    </div>
                `;

                const response = await fetch('https://gitlab.com/api/v4/users/borbehr/projects?order_by=updated_at&sort=desc&per_page=20');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const projects = await response.json();
                
                if (projects.length === 0) {
                    grid.innerHTML = `
                        <div class="status-message">
                            <p>Публичные проекты не найдены</p>
                        </div>
                    `;
                    return;
                }
                
                const projectsHTML = projects.map(project => {
                    const description = project.description || 'Нет описания';
                    const lastActivity = new Date(project.last_activity_at).toLocaleDateString('ru-RU', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });
                    
                    return `
                        <div class="project-card">
                            <div class="project-header">
                                <div class="project-icon">
                                    🚀
                                </div>
                                <div class="project-title">
                                    <a href="${project.web_url}" target="_blank" rel="noopener">${project.name}</a>
                                </div>
                            </div>
                            <div class="project-description">
                                ${description}
                            </div>
                            <div class="project-stats">
                                <div class="project-stat">
                                    ⭐ ${project.star_count}
                                </div>
                                <div class="project-stat">
                                    🍴 ${project.forks_count}
                                </div>
                                <div class="project-stat">
                                    📅 ${lastActivity}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                grid.innerHTML = projectsHTML;
                
            } catch (error) {
                console.error('Error loading projects:', error);
                grid.innerHTML = `
                    <div class="status-message">
                        <p>Ошибка загрузки проектов: ${error.message}</p>
                    </div>
                `;
            }
        }

        // Load projects on page load
        loadProjects();

        // Refresh button
        document.getElementById('refresh-projects').addEventListener('click', loadProjects);
    </script>
</body>
</html>
