<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>borBeHR Ukraine - Final</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Эффект шума/CRT на заднем фоне */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 255, 0, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 2;
            pointer-events: none;
        }

        .container {
            text-align: center;
            padding: 2rem;
            z-index: 5;
            max-width: 600px;
            width: 100%;
        }

        .status-title {
            font-size: 2rem;
            font-weight: 700;
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            animation: pulse 2s infinite alternate;
        }

        .sub-title {
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
            color: #888;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff3333, transparent);
            margin: 1.5rem 0;
            box-shadow: 0 0 8px #ff3333;
        }

        /* Стилизация аудиоплеера под тему */
        .player-wrapper {
            margin: 2rem 0;
            display: flex;
            justify-content: center;
        }

        audio {
            width: 100%;
            max-width: 400px;
            filter: invert(1) hue-rotate(180deg); /* Инверсия цветов, чтобы плеер стал темным */
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        audio:hover {
            opacity: 1;
        }

        .tech-details {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.9;
            }
            100% {
                transform: scale(1.02);
                opacity: 1;
                text-shadow: 0 0 25px rgba(255, 51, 51, 0.8), 0 0 5px rgba(255, 255, 255, 0.5);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-title">borBeHR Ukraine end.</div>
        <div class="sub-title">Final Ukraine Track:</div>
        
        <div class="divider"></div>
        
        <div class="player-wrapper">
            <audio controls>
                <source src="Затишье,перед бурей.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div class="tech-details" id="timestamp"></div>
    </div>

    <script>
        function updateTimestamp() {
            const now = new Date();
            const dateStr = now.toISOString().replace('T', ' ').substring(0, 19);
            document.getElementById('timestamp').textContent = `SYSTEM_OFFLINE // ${dateStr} // GMT`;
        }
        updateTimestamp();
    </script>
</body>
</html>
