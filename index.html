<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // MAINTENANCE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #00ff41;
            font-family: 'VT323', monospace;
            font-size: 18px;
            line-height: 1.4;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .terminal {
            width: 100%;
            max-width: 920px;
            height: 100vh;
            background: #000;
            border: 4px solid #00ff41;
            box-shadow: 0 0 40px #00ff41;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 65, 0.03) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            animation: scan 4s linear infinite;
            z-index: 1;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .content {
            height: calc(100vh - 160px);
            overflow-y: auto;
            padding-right: 20px;
            position: relative;
            z-index: 2;
        }

        .line {
            margin-bottom: 8px;
            white-space: pre-wrap;
        }

        .blink {
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .green { color: #00ff41; }
        .yellow { color: #ffff00; }
        .red { color: #ff4444; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="scan-line"></div>
        
        <div class="header">
            ██████╗ TERMINAL v0.8.4 — DEUTSCHLAND INFRASTRUCTURE
        </div>

        <div class="content" id="content"></div>

        <div style="position: absolute; bottom: 20px; left: 20px; right: 20px; color: #00aa33; font-size: 16px;">
            root@maintenance-de:\~# <span class="blink">_</span>
        </div>
    </div>

    <script>
        const content = document.getElementById('content');
        
        // Автоматически берём домен
        let domain = window.location.hostname || "Created by borBeHR.eu.org";

        function typeText(text, element, speed = 30, callback) {
            let i = 0;
            element.textContent = '';
            const interval = setInterval(() => {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(interval);
                    if (callback) callback();
                }
            }, speed);
        }

        function addLine(text, className = '') {
            const line = document.createElement('div');
            line.className = `line ${className}`;
            line.textContent = text;
            content.appendChild(line);
            content.scrollTop = content.scrollHeight;
            return line;
        }

        function startTerminal() {
            addLine(`[INFO] Подключение к серверу...`, 'green');
            
            setTimeout(() => {
                const searchLine = addLine('');
                typeText(`Поиск сайта ${domain}...`, searchLine, 40, () => {
                    
                    addLine('Проверка DNS-записи... ✓', 'green');
                    
                    setTimeout(() => {
                        addLine('Проверка SSL-сертификата... ✓', 'green');
                        addLine('Проверка сервера... ✓', 'green');
                        
                        setTimeout(() => {
                            addLine('');
                            const status = addLine('');
                            typeText('Статус: НА ТЕХНИЧЕСКИХ РАБОТАХ', status, 50, () => {
                                addLine('');
                                addLine('Сайт на технических работах в Германии.', 'yellow');
                                addLine('Bitte versuchen Sie es später erneut.', 'yellow');
                                addLine('Пожалуйста, проверьте позже.', 'yellow');
                                addLine('');
                                addLine('═══════════════════════════════════════', 'green');
                                addLine('Примерное время восстановления: не указано', 'red');
                                addLine('Регион: Germany | Дополнительная информация не указана', 'green');
                                addLine(`Домен: ${domain}`, 'green');
                                addLine('');
                                addLine('[SYSTEM] t.me/borbehr', 'green');
                            });
                        }, 800);
                    }, 600);
                });
            }, 400);
        }

        window.onload = startTerminal;
    </script>
</body>
</html>
