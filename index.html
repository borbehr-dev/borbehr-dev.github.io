<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>500 Internal Server Error</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Share Tech Mono', 'Archivo', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Эффект шума на заднем фоне */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 2;
            pointer-events: none;
        }

        .error-container {
            text-align: center;
            padding: 2rem;
            z-index: 5;
            max-width: 600px;
            width: 100%;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 700;
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
            margin-bottom: 1rem;
            animation: pulse 2s infinite alternate;
        }

        .error-title {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            color: #e0e0e0;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff3333, transparent);
            margin: 1.5rem 0;
            box-shadow: 0 0 8px #ff3333;
        }

        .error-message {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #a0a0a0;
            white-space: pre-line;
        }

        .tech-details {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Анимация пульсации для кода ошибки */
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.9;
            }
            100% {
                transform: scale(1.02);
                opacity: 1;
                text-shadow: 0 0 25px rgba(255, 51, 51, 0.8), 0 0 5px rgba(255, 255, 255, 0.5);
            }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">500</div>
        <div class="error-title">Internal Server Error</div>
        
        <div class="divider"></div>
        
        <div class="error-message">
            Technical Work for borbehr.eu.org site
        </div>

        <div class="tech-details" id="timestamp"></div>
    </div>

    <script>
        // Небольшой скрипт для вывода реального времени ошибки (добавляет атмосферы хакерского/сломанного терминала)
        function updateTimestamp() {
            const now = new Date();
            const dateStr = now.toISOString().replace('T', ' ').substring(0, 19);
            document.getElementById('timestamp').textContent = `CRITICAL_ERR_LOG // ${dateStr} // GMT`;
        }
        updateTimestamp();
    </script>
</body>
</html>
