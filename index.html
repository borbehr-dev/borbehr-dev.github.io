<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домен приостановлен</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            family: 'Inter', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            animation: background-animate 20s ease-in-out infinite alternate;
            background: linear-gradient(-45deg, #1a202c, #2d3748, #1e3a5f, #3b82f6);
            background-size: 400% 400%;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        @keyframes background-animate {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .card-container {
            background-color: rgba(26, 32, 44, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            animation: fadeIn 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s;
            max-width: 36rem;
            width: 100%;
            padding: 2rem;
            text-align: center;
        }
        .card-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .subtitle {
            font-size: 1.25rem;
            color: #9ca3af;
            margin-bottom: 1rem;
        }
        .description {
            color: #d1d5db;
            font-size: 1.125rem;
            margin-top: 1rem;
        }
        .domain-placeholder {
            font-weight: 600;
            background: rgba(59, 130, 246, 0.2);
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;
            word-break: break-all;
        }
        @media (min-width: 768px) {
            .card-container {
                padding: 3rem;
            }
            h1 {
                font-size: 2.25rem;
            }
            .subtitle {
                font-size: 1.5rem;
            }
        }
        ul {
            text-align: left;
            margin-top: 1rem;
            padding-left: 1.5rem;
            color: #d1d5db;
        }
        li {
            margin: 0.5rem 0;
        }
        .reason-list {
            list-style-type: disc;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<div class="card-container">
    <h1>Домен приостановлен</h1>
    <div class="subtitle">Данный сайт временно заморожен.</div>
    <div class="description">
        <strong>Возможные причины:</strong>
        <ul class="reason-list">
            <li>Смена провайдера git-репозитория</li>
            <li>Технические работы на сайте</li>
        </ul>
    </div>
    <div class="description" style="margin-top: 1.5rem;">
     <span id="domain-message"></span>
    </div>
</div>

<script>
    (function() {
        // Получаем текущий домен
        let currentDomain = window.location.hostname;
        // Если домен пустой или localhost, покажем заглушку
        if (!currentDomain || currentDomain === '') {
            currentDomain = 'Domain not found';
        }
        const messageElement = document.getElementById('domain-message');
        if (messageElement) {
            messageElement.innerHTML = ` <span class="domain-placeholder">${currentDomain}</span>`;
        }
    })();
</script>
</body>
</html>
