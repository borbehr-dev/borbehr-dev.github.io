<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Полное обновление | borBeHR</title>
    <style>
        :root {
            --bg-primary: #050505;
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --text-primary: #ffffff;
            --text-secondary: #aaa;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .mesh-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .container {
            text-align: center;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.2rem;
        }

        .highlight {
            color: var(--text-primary);
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--accent-secondary);
            border-radius: 12px;
            color: var(--accent-secondary);
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .loader {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            border-top-color: var(--accent-secondary);
            margin: 25px auto 0;
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="mesh-gradient"></div>
    
    <div class="container">
        <div class="icon">🚀</div>
        <h1>Глобальная стройка</h1>
        <p>
            Мы решили не просто починить, а <span class="highlight">переписать всё с нуля</span>. 
            Старый код отправлен на свалку истории.
        </p>
        <p>
            Создаем чистую архитектуру, новый дизайн и запредельную скорость. 
        </p>
        
        <div class="status-badge">Website rebuilding...</div>
        
        <div class="loader"></div>
    </div>
</body>
</html>
