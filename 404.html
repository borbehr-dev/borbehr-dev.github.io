<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Ошибка калибровки | Borbehr</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --error-color: #f85149;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            color: var(--error-color);
            text-shadow: 0 0 20px rgba(248, 81, 73, 0.3);
        }

        h2 {
            font-size: 1.5rem;
            margin: 10px 0 20px;
            font-weight: 400;
        }

        p {
            line-height: 1.6;
            color: #8b949e;
            margin-bottom: 30px;
        }

        .code-box {
            background: #161b22;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #30363d;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-align: left;
            color: #79c0ff;
        }

        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            border: 1px solid var(--accent-color);
            padding: 10px 20px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        a:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        .glitch {
            position: relative;
            display: inline-block;
        }

        /* Небольшая анимация для красоты */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .status {
            font-size: 0.8rem;
            color: var(--error-color);
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status">● CRITICAL_ERROR: PAGE_NOT_FOUND</div>
        <h1 class="glitch">404</h1>
        <h2>Маршрут не найден</h2>
        
        <p>Похоже, запрашиваемый узел отсутствует в DNS-структуре или был перемещен в ходе миграции на v1.0.1 Stable.</p>

        <div class="code-box">
            $ get-status --url borbehr.eu.org<br>
            > [ERROR] Target point not verified<br>
            > [INFO] Searching for alternatives...
        </div>

        <div class="links">
            <a href="https://borbehr.eu.org">На главную</a>
            <a href="https://forum.borbehr.eu.org">Форум</a>
            <a href="https://gitlab.com/borbehr/borbehr.eu.org/">GitLab</a>
        </div>
    </div>

</body>
</html>
